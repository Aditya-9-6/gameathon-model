name: Build Windows/Mac Desktop App

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Create Electron App
        shell: cmd
        run: |
          mkdir electron_app
          cd electron_app
          
          # Create app directory and copy files
          mkdir app
          xcopy "..\frontend\*" "app\" /E /I /Y
          
          # Handle HTML redirection for Electron
          # Use copy instead of move to avoid "file not found" errors if already renamed
          copy "app\index.html" "app\defense_board.html"
          copy "app\unified.html" "app\index.html"
          
          # Generate package.json using Node (more robust than echo)
          echo const fs = require('fs'); > gen_pkg.js
          echo const pkg = { >> gen_pkg.js
          echo   name: 'ironwall-desktop', >> gen_pkg.js
          echo   version: '1.0.0', >> gen_pkg.js
          echo   main: 'main.js', >> gen_pkg.js
          echo   author: 'Aditya-9-6', >> gen_pkg.js
          echo   scripts: { build: 'electron-builder --win --x64' }, >> gen_pkg.js
          echo   build: { appId: 'com.ironwall.desktop', productName: 'IronWall Plus Demo', directories: { output: 'dist' }, win: { target: 'portable' } } >> gen_pkg.js
          echo }; >> gen_pkg.js
          echo fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2)); >> gen_pkg.js
          node gen_pkg.js
          
          # Create main.js using Node
          echo const fs = require('fs'); > gen_main.js
          echo const code = "const { app, BrowserWindow } = require('electron'); const path = require('path'); function createWindow () { const win = new BrowserWindow({ width: 1920, height: 1080, fullscreen: true, autoHideMenuBar: true, webPreferences: { nodeIntegration: true } }); win.loadFile('app/index.html'); } app.whenReady().then(createWindow);"; >> gen_main.js
          echo fs.writeFileSync('main.js', code); >> gen_main.js
          node gen_main.js
          
          # Install dependencies
          npm install electron electron-builder

      - name: Build Windows .EXE
        shell: cmd
        run: |
          cd electron_app
          npm run build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            electron_app/dist/*.exe
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename and Upload Asset (Optional but better for naming)
        shell: cmd
        run: |
          cd electron_app/dist
          ren *.exe ironwall-gamethon-desktop.exe
          
      - name: Update Latest Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: electron_app/dist/ironwall-gamethon-desktop.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
