name: Build Android APK

on:
  push:
    paths:
      - 'frontend/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create Capacitor App
        run: |
          mkdir cap_app
          cd cap_app
          npm init -y
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # Create config
          cat <<EOF > capacitor.config.json
          {
            "appId": "com.gamethon.ironwall",
            "appName": "IronWall",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          EOF
          
          # Copy frontend files
          mkdir www
          cp -r ../frontend/* www/
          
          # Setup mobile landing page
          mv www/index.html www/game_board.html
          mv www/lobby.html www/index.html
          
          # Initialize Android
          npx cap add android
          npx cap copy android
          npx cap sync android

      - name: Build Android APK
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: current
          arguments: assembleDebug --no-daemon
          build-root-directory: cap_app/android

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            cap_app/android/app/build/outputs/apk/debug/app-debug.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename and Update Asset
        run: |
          cp cap_app/android/app/build/outputs/apk/debug/app-debug.apk ironwall-gamethon.apk
          
      - name: Update Latest Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: ironwall-gamethon.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
