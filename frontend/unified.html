<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IRONWALL+ | UNIFIED COMMAND CENTER</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #020205;
            color: #00f5ff;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Bar */
        #top-bar {
            height: 56px;
            background: rgba(2, 2, 5, 0.95);
            border-bottom: 1px solid rgba(0, 245, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            margin: 0;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #00f5ff;
        }

        .brand .badge {
            font-size: 0.6rem;
            background: rgba(0, 245, 255, 0.1);
            padding: 2px 6px;
            border: 1px solid rgba(0, 245, 255, 0.4);
            border-radius: 4px;
            color: #00f5ff;
        }

        .nav-controls {
            display: flex;
            gap: 15px;
        }

        .nav-link {
            text-decoration: none;
            color: rgba(0, 245, 255, 0.6);
            font-size: 0.8rem;
            padding: 5px 10px;
            border: 1px solid transparent;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-link:hover,
        .nav-link.active {
            color: #fff;
            border-color: rgba(0, 245, 255, 0.3);
            background: rgba(0, 245, 255, 0.05);
            text-shadow: 0 0 8px #00f5ff;
        }

        /* Viewport Layout */
        #viewport {
            flex: 1;
            display: flex;
            position: relative;
            background: #000;
        }

        /* Pane Styling */
        .pane {
            height: 100%;
            position: relative;
            transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        #defense-pane {
            width: 70%;
            border-right: 1px solid rgba(0, 245, 255, 0.1);
        }

        #attack-pane {
            width: 30%;
            background: #050510;
        }

        /* Fullscreen Toggle Mode */
        body.focus-defense #defense-pane {
            width: 100%;
        }

        body.focus-defense #attack-pane {
            width: 0%;
        }

        body.focus-attack #defense-pane {
            width: 0%;
        }

        body.focus-attack #attack-pane {
            width: 100%;
        }

        /* Frame container */
        .frame-wrap {
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* Interaction Overlay (optional) */
        .pane-label {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.3);
            z-index: 10;
            pointer-events: none;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Bottom Status bar */
        #status-bar {
            height: 24px;
            background: #000;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 0.6rem;
            color: #444;
            letter-spacing: 1px;
        }

        .status-item {
            margin-right: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: #39ff14;
            box-shadow: 0 0 5px #39ff14;
        }

        /* Mobile / Split View Controller */
        #view-toggle {
            display: none;
            position: absolute;
            bottom: 40px;
            right: 20px;
            z-index: 200;
            background: rgba(2, 2, 5, 0.9);
            border: 1px solid #00f5ff;
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
            gap: 10px;
        }

        @media (max-width: 1100px) {
            /* (AI panel auto-activation removed — user can open with the button inside the defense frame) */
            #viewport {
                flex-direction: column;
            }

            #defense-pane,
            #attack-pane {
                width: 100% !important;
                height: 50%;
            }

            body.focus-defense #attack-pane {
                display: none;
            }

            body.focus-defense #defense-pane {
                height: 100%;
            }

            body.focus-attack #defense-pane {
                display: none;
            }

            body.focus-attack #attack-pane {
                height: 100%;
            }
        }
    </style>
</head>

<body>

    <header id="top-bar">
        <div class="brand">
            <h1>IRONWALL<span style="color:#ff1744">✛</span></h1>
            <span class="badge">UNIFIED COMMAND v15.0</span>
        </div>

        <nav class="nav-controls">
            <div class="nav-link active" onclick="setView('split')">SPLIT VIEW</div>
            <div class="nav-link" onclick="setView('defense')">DEFENSE CORE</div>
            <div class="nav-link" onclick="setView('attack')">RED TEAM</div>
            <a href="lobby.html" class="nav-link">EXIT TO LOBBY</a>
        </nav>
    </header>

    <main id="viewport">
        <!-- Defense Pane -->
        <section id="defense-pane" class="pane">
            <div class="pane-label">// ACTIVE DEFENSE GRID</div>
            <div class="frame-wrap">
                <iframe src="defense.html" id="defense-frame" title="Defense Grid"></iframe>
            </div>
        </section>

        <!-- Red Team Pane -->
        <section id="attack-pane" class="pane">
            <div class="pane-label">// OFFENSIVE OPERATIONS</div>
            <div class="frame-wrap">
                <iframe src="attacker.html?v=101" id="attack-frame" title="Red Team Panel"></iframe>
            </div>
        </section>
    </main>

    <footer id="status-bar">
        <div class="status-item"><span class="dot"></span> SYST-OK</div>
        <div class="status-item">WS-BRIDGE: ESTABLISHED</div>
        <div class="status-item">LATENCY: 0.12ms</div>
        <div style="margin-left: auto;">PROJECT NIRVANA — ABSOLUTE SOVEREIGNTY</div>
    </footer>

    <script>
        function setView(mode) {
            document.body.classList.remove('focus-defense', 'focus-attack');
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));

            if (mode === 'defense') {
                document.body.classList.add('focus-defense');
                event.target.classList.add('active');
            } else if (mode === 'attack') {
                document.body.classList.add('focus-attack');
                event.target.classList.add('active');
            } else {
                document.querySelectorAll('.nav-link')[0].classList.add('active');
            }
        }

        // Auto-refresh frames on load to ensure SW pickup
        window.addEventListener('load', () => {
            console.log("Unified Command Online.");
        });
    </script>
</body>

</html>
