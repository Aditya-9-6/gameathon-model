services:
  # 1. Rust Backend Web Service (Uses Free Tier)
  - type: web
    name: ironwall-backend
    runtime: rust
    plan: free
    buildCommand: cd backend && cargo build --release --jobs 1
    startCommand: ./backend/target/release/ironwall-gamethon
    envVars:
      - key: CARGO_BUILD_JOBS
        value: 1 # LIMIT CPU/MEM usage during build
      - key: RUST_LOG
        value: info

  # 2. Static Frontend Site
  - type: web
    name: ironwall-frontend
    runtime: static
    staticPublishPath: ./frontend
    envVars:
      - key: BACKEND_URL
        value: https://ironwall-backend.onrender.com
